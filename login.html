<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 IT-Курс — Вход</title>
<link rel="stylesheet" href="css/style.css">
<style>
body {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

.login-box {
  background: white;
  border-radius: 32px;
  padding: 48px 40px;
  max-width: 480px;
  width: 100%;
  box-shadow: 0 16px 64px rgba(0,0,0,0.25);
  text-align: center;
}

.login-emoji { font-size: 4rem; display: block; margin-bottom: 16px; animation: bounce 2s infinite; }
.login-title { font-size: 1.8rem; font-weight: 900; color: #1e1b4b; margin-bottom: 8px; }
.login-subtitle { font-size: 1rem; color: #6b7280; font-weight: 600; margin-bottom: 32px; }

.login-input {
  width: 100%;
  padding: 14px 20px;
  border: 3px solid #e5e7eb;
  border-radius: 16px;
  font-family: inherit;
  font-size: 1.1rem;
  font-weight: 700;
  color: #1e1b4b;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
  box-sizing: border-box;
}
.login-input:focus { border-color: #7c3aed; }
.login-input::placeholder { color: #9ca3af; font-weight: 600; }

.login-btn {
  width: 100%;
  padding: 14px;
  margin-top: 16px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg, #7c3aed, #db2777);
  color: white;
  font-family: inherit;
  font-size: 1.2rem;
  font-weight: 900;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 8px 24px rgba(124,58,237,0.4);
}
.login-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(124,58,237,0.5); }
.login-btn:active { transform: translateY(0); }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.login-error {
  color: #dc2626;
  font-weight: 700;
  font-size: 0.9rem;
  margin-top: 12px;
  display: none;
}

.login-info {
  margin-top: 24px;
  padding-top: 24px;
  border-top: 2px solid #f3f4f6;
}
.login-info p {
  font-size: 0.85rem;
  color: #9ca3af;
  font-weight: 600;
  line-height: 1.5;
}

.login-links {
  margin-top: 20px;
  display: flex;
  gap: 12px;
  justify-content: center;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
</style>
</head>
<body>

<div class="login-box">
  <span class="login-emoji">🚀</span>
  <h1 class="login-title">IT-Курс для Героев!</h1>
  <p class="login-subtitle">Введите логин ученика для начала или продолжения курса</p>

  <form id="login-form" onsubmit="handleLogin(event)">
    <input
      type="text"
      id="student-login"
      class="login-input"
      placeholder="Логин ученика"
      autocomplete="off"
      required
      minlength="2"
      maxlength="30"
      pattern="[a-zA-Zа-яА-ЯёЁ0-9_\-]+"
      title="Только буквы, цифры, дефис и подчёркивание"
    >
    <div class="login-error" id="login-error"></div>
    <button type="submit" class="login-btn" id="login-btn">🎓 Начать курс</button>
  </form>

  <div id="student-status" style="margin-top:16px; display:none"></div>

  <div class="login-info">
    <p>Введите <strong>уникальный логин</strong> ученика.<br>
    Новый логин — создастся новый курс.<br>
    Существующий логин — продолжится прежний.</p>
  </div>

  <div class="login-links">
    <a href="admin.html" class="btn" style="background:#f3f4f6; color:#374151; font-size:0.85rem; padding:8px 16px">⚙️ Управление учениками</a>
  </div>
</div>

<script>
const STORAGE_KEY = "pro_course_students";
const CURRENT_KEY = "pro_course_current";

function getAllStudents() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveAllStudents(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

const loginInput = document.getElementById("student-login");
const statusDiv = document.getElementById("student-status");
const errorDiv = document.getElementById("login-error");
const loginBtn = document.getElementById("login-btn");

// Live feedback as user types
loginInput.addEventListener("input", function() {
  const val = this.value.trim();
  errorDiv.style.display = "none";

  if (val.length < 2) {
    statusDiv.style.display = "none";
    loginBtn.textContent = "🎓 Начать курс";
    return;
  }

  const students = getAllStudents();
  if (students[val]) {
    const s = students[val];
    const count = Object.keys(s.completedLessons).length;
    statusDiv.style.display = "block";
    statusDiv.innerHTML = `
      <div style="background:#f0fdf4; border:2px solid #10b981; border-radius:12px; padding:12px; font-size:0.9rem">
        <div style="font-weight:900; color:#065f46">✅ Ученик найден!</div>
        <div style="color:#374151; font-weight:600; margin-top:4px">Начало: ${s.startDate} | Пройдено: ${count}/18</div>
      </div>`;
    loginBtn.textContent = "▶️ Продолжить курс";
  } else {
    statusDiv.style.display = "block";
    statusDiv.innerHTML = `
      <div style="background:#eff6ff; border:2px solid #3b82f6; border-radius:12px; padding:12px; font-size:0.9rem">
        <div style="font-weight:900; color:#1e40af">🆕 Новый ученик</div>
        <div style="color:#374151; font-weight:600; margin-top:4px">Будет создан новый курс</div>
      </div>`;
    loginBtn.textContent = "🎓 Начать новый курс";
  }
});

function handleLogin(e) {
  e.preventDefault();
  const val = loginInput.value.trim();

  if (val.length < 2) {
    errorDiv.textContent = "Логин должен быть от 2 символов";
    errorDiv.style.display = "block";
    return;
  }

  if (!/^[a-zA-Zа-яА-ЯёЁ0-9_\-]+$/.test(val)) {
    errorDiv.textContent = "Только буквы, цифры, дефис и подчёркивание";
    errorDiv.style.display = "block";
    return;
  }

  // Create student if new
  const students = getAllStudents();
  if (!students[val]) {
    students[val] = {
      login: val,
      startDate: new Date().toISOString().slice(0, 10),
      completedLessons: {}
    };
    saveAllStudents(students);
  }

  // Set as current
  localStorage.setItem(CURRENT_KEY, val);

  // Go to course
  window.location.href = "index.html";
}
</script>

</body>
</html>
